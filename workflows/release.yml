name: "Setup"
description: "Setup js/ts runtime"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
         fetch-depth: 0

    - name: Install bun
      uses: oven-sh/setup-bun@v2

    - name: Release
      run: bunx changelogithub
      env:
        GITHUB_TOKEN: ${{github.token}}
