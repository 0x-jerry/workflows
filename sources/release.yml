name: Release

on:
  workflow_call:
    inputs:
    secrets:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Release
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{github.token}}
