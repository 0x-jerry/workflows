name: Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: pnpm i
      - run: pnpm run ci:test
