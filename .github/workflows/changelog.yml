name: Release

on:
  workflow_call:
    inputs: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup bun
        uses: 0x-jerry/workflows/actions/setup-js@main
        with:
          fetch-all: true

      - name: Release
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
